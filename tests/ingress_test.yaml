suite: ingress
templates:
  - ingress.yaml
tests:
  - it: renders nothing when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: is an Ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - isAPIVersion:
          of: networking.k8s.io/v1

  - it: has correct name when enabled
    set:
      ingress.enabled: true
    release:
      name: test-release
    asserts:
      - equal:
          path: metadata.name
          value: test-release-sample-app

  - it: sets ingressClassName when provided
    set:
      ingress.enabled: true
      ingress.className: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: omits ingressClassName when empty
    set:
      ingress.enabled: true
      ingress.className: ""
    asserts:
      - notExists:
          path: spec.ingressClassName

  - it: sets host and path rules
    values:
      - ./values/ingress-hosts.yaml
    asserts:
      - equal:
          path: spec.rules[0].host
          value: myapp.example.com
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  - it: sets annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: /

  - it: sets TLS when configured
    values:
      - ./values/ingress-tls.yaml
    asserts:
      - exists:
          path: spec.tls
      - equal:
          path: spec.tls[0].secretName
          value: myapp-tls
