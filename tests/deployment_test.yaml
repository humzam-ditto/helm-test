suite: deployment
templates:
  - deployment.yaml
tests:
  - it: is a Deployment
    asserts:
      - isKind:
          of: Deployment
      - isAPIVersion:
          of: apps/v1

  - it: has correct name
    set:
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app

  - it: uses fullname as release-chart by default
    release:
      name: test-release
    asserts:
      - equal:
          path: metadata.name
          value: test-release-sample-app

  - it: uses release name alone when it contains chart name
    release:
      name: sample-app
    asserts:
      - equal:
          path: metadata.name
          value: sample-app

  - it: sets replica count from values
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: omits replicas when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: uses correct image
    set:
      image.repository: myrepo/myapp
      image.tag: "2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: myrepo/myapp:2.0.0

  - it: falls back to chart appVersion when tag is unset
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "nginx:1.0.0"

  - it: sets imagePullPolicy
    set:
      image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: exposes port 80
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 80

  - it: sets resource limits and requests
    set:
      resources.limits.cpu: 200m
      resources.limits.memory: 256Mi
      resources.requests.cpu: 100m
      resources.requests.memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  - it: renders env vars when set
    set:
      env:
        - name: ENV_VAR
          value: hello
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ENV_VAR
            value: hello

  - it: has no env vars by default
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env

  - it: sets pod annotations
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: has liveness and readiness probes
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe
      - exists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: has correct selector labels
    release:
      name: test-release
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: sample-app
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test-release
