suite: service
templates:
  - service.yaml
tests:
  - it: is a Service
    asserts:
      - isKind:
          of: Service

  - it: has correct name
    release:
      name: test-release
    asserts:
      - equal:
          path: metadata.name
          value: test-release-sample-app

  - it: defaults to ClusterIP
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: can be set to LoadBalancer
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: exposes correct port
    set:
      service.port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: has correct selector labels
    release:
      name: test-release
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: sample-app
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: test-release
